<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#111827"/>
  
  <!-- Subtle background grid lines for architectural premium detailing -->
  <path d="M 64 0 L 64 512 M 128 0 L 128 512 M 192 0 L 192 512 M 256 0 L 256 512 M 320 0 L 320 512 M 384 0 L 384 512 M 448 0 L 448 512" stroke="rgba(212, 175, 55, 0.03)" stroke-width="1"/>
  <path d="M 0 64 L 512 64 M 0 128 L 512 128 M 0 192 L 512 192 M 0 256 L 512 256 M 0 320 L 512 320 M 0 384 L 512 384 M 0 448 L 512 448" stroke="rgba(212, 175, 55, 0.03)" stroke-width="1"/>
  
  <!-- Outer Gold Frame -->
  <rect x="40" y="40" width="432" height="432" rx="72" fill="none" stroke="#D4AF37" stroke-width="4" stroke-opacity="0.2"/>
  <rect x="48" y="48" width="416" height="416" rx="64" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Logo Icon Geometry (Abstract Arches for Mane Mithra MM) -->
  <g transform="translate(256, 256) scale(1.1)">
    <!-- Main Left Column -->
    <path d="M -80 80 L -80 -40 Q -80 -80 -40 -80 Q 0 -80 0 -40 L 0 80" fill="none" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>
    <!-- Main Right Column -->
    <path d="M 0 80 L 0 -40 Q 0 -80 40 -80 Q 80 -80 80 80" fill="none" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Central Modern Crossbars and details -->
    <line x1="-80" y1="-10" x2="80" y2="-10" stroke="#8B5E3C" stroke-width="6" stroke-opacity="0.7"/>
    <line x1="-80" y1="25" x2="80" y2="25" stroke="#8B5E3C" stroke-width="6" stroke-opacity="0.7"/>
    
    <!-- Outer Glow accents -->
    <circle cx="0" cy="-40" r="8" fill="#D4AF37"/>
  </g>
</svg>
